<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecToolkit - 폐쇄망 보안 분석 도구</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; padding-top: 20px; }
        .sidebar a { color: #adb5bd; padding: 10px 20px; display: block; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: #343a40; border-left: 4px solid #0d6efd; }
        .main-content { padding: 30px; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .nav-tabs .nav-link.active { font-weight: bold; border-bottom: 3px solid #0d6efd; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 사이드바 -->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="text-center mb-4">
                    <h4 class="text-white">SecToolkit</h4>
                    <small class="text-muted">v0.1 (MVP)</small>
                </div>
                <a href="#decoder" class="active">Transform & Count</a>
                <a href="#analyzer">Analysis & Metrics</a>
                <a href="#security">Extension & Security</a>
            </nav>

            <!-- 메인 컨텐츠 -->
            <main class="col-md-10 main-content">
                <div id="decoder-section">
                    <h2 class="mb-4">Data Transform & Counter</h2>
                    
                    <div class="row">
                        <!-- Multi-Decoder -->
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header bg-primary text-white">Multi-Decoder</div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <textarea class="form-control" id="decoderInput" rows="5" placeholder="인코딩된 데이터를 입력하세요..."></textarea>
                                    </div>
                                    <div class="d-flex gap-2 mb-3">
                                        <button class="btn btn-outline-primary btn-sm" onclick="decode('url')">URL Decode</button>
                                        <button class="btn btn-outline-primary btn-sm" onclick="decode('base64')">Base64 Decode</button>
                                    </div>
                                    <div class="mb-3">
                                        <textarea class="form-control" id="decoderOutput" rows="5" readonly placeholder="결과가 여기에 표시됩니다..."></textarea>
                                    </div>
                                    <button class="btn btn-secondary btn-sm" onclick="copyToClipboard('decoderOutput')">Copy to Clipboard</button>
                                </div>
                            </div>
                        </div>

                        <!-- Byte Counter -->
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header bg-success text-white">Byte Counter</div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <textarea class="form-control" id="counterInput" rows="5" placeholder="바이트를 계산할 텍스트를 입력하세요..."></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <select class="form-select" id="encodingSelect">
                                            <option value="utf-8">UTF-8</option>
                                            <option value="euc-kr">EUC-KR</option>
                                        </select>
                                    </div>
                                    <div class="alert alert-info">
                                        <strong>Result:</strong> <span id="byteResult">0</span> Bytes
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        async function decode(type) {
            const input = document.getElementById('decoderInput').value;
            if(!input) return;
            
            // Backend API 연동 (추후 구현)
            const response = await fetch('/api/decode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: input, type: type })
            });
            const result = await response.json();
            document.getElementById('decoderOutput').value = result.decoded || result.error;
        }

        document.getElementById('counterInput').addEventListener('input', async function() {
            const text = this.value;
            const encoding = document.getElementById('encodingSelect').value;
            
            const response = await fetch('/api/count-bytes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, encoding: encoding })
            });
            const result = await response.json();
            document.getElementById('byteResult').innerText = result.bytes;
        });

        function copyToClipboard(id) {
            const copyText = document.getElementById(id);
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("복사되었습니다.");
        }
    </script>
</body>
</html>
