<!-- PAC Tester (Integrated) -->
<div id="view-pactester" class="content-section">
    <!-- Server Manager (Accordion) -->
    <div class="tool-card p-0 overflow-hidden mb-3 border shadow-sm">
        <div id="pacQuickSelect" class="bg-white px-4 py-2 border-bottom d-flex align-items-center gap-2 overflow-auto" style="min-height: 45px;">
            <small class="text-muted flex-shrink-0">Quick Load:</small>
            <div id="pacQuickList" class="d-flex gap-2"></div>
        </div>
        
        <div class="accordion accordion-flush" id="pacManagerAccordion">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed fw-bold py-3 px-4" type="button" data-bs-toggle="collapse" data-bs-target="#collapseManager">
                        PAC Server Manager
                    </button>
                </h2>
                <div id="collapseManager" class="accordion-collapse collapse" data-bs-parent="#pacManagerAccordion">
                    <div class="accordion-body p-4 bg-white">
                        <div class="row g-2 align-items-end mb-3">
                            <div class="col-md-3"><label class="small text-muted mb-1">Group Name</label><input type="text" class="form-control form-control-sm" id="groupName" placeholder="e.g. Production"></div>
                            <div class="col-md-4"><label class="small text-muted mb-1">Prod PAC URL</label><input type="text" class="form-control form-control-sm" id="prodUrl" placeholder="http://..."></div>
                            <div class="col-md-4"><label class="small text-muted mb-1">Test PAC URL</label><input type="text" class="form-control form-control-sm" id="testUrl" placeholder="http://..."></div>
                            <div class="col-md-1"><button class="btn btn-success btn-sm w-100 py-2" onclick="savePacGroup()">Save</button></div>
                        </div>
                        <div id="pacGroupList" class="d-flex flex-wrap gap-2 pt-2 border-top"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Unified Controls -->
    <div class="tool-card p-4 border shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">PAC Tester & Validator</h5>
            <div class="d-flex gap-2">
                <button class="btn btn-primary btn-sm px-3" onclick="testProdPac()">Test (Prod Only)</button>
                <button class="btn btn-outline-primary btn-sm px-3" onclick="comparePac()">Compare (Prod vs Test)</button>
            </div>
        </div>
        
        <div class="row g-2 align-items-center mb-3">
            <div class="col-sm-3 text-muted small">Target Validation URL</div>
            <div class="col-sm-9"><input type="text" class="form-control form-control-sm font-monospace" id="diffSampleUrl" value="https://www.google.com"></div>
        </div>
        
        <div id="diffLoading" class="text-center d-none py-2 mb-3 small"><div class="spinner-border spinner-border-sm text-primary"></div> 처리 중...</div>
        
        <div id="pacResultsContent">
            <!-- Common Information (IP, Target URL, DNS) -->
            <div id="commonResultBox" class="border rounded p-3 small mb-4 bg-white shadow-sm" style="display:none;"></div>

            <!-- Mode Specific Content (Cards, Diff, Preview) -->
            <div id="modeResultContent">
                <!-- Individual Status Cards -->
                <div class="row g-2 mb-4" id="statusCardsRow" style="display:none;">
                    <div class="col-md-6" id="prodStatusCol">
                        <div class="p-3 rounded border h-100 bg-white" id="prodStatusCard">
                            <small class="text-muted d-block mb-1">Production PAC</small>
                            <div class="fw-bold small" id="prodValidText"></div>
                            <div class="font-monospace small text-truncate text-muted mt-2" id="prodProxyResult" style="font-size: 0.75rem;"></div>
                        </div>
                    </div>
                    <div class="col-md-6" id="testStatusCol" style="display:none;">
                        <div class="p-3 rounded border h-100 bg-white" id="testStatusCard">
                            <small class="text-muted d-block mb-1">Test PAC (Proposed)</small>
                            <div class="fw-bold small" id="testValidText"></div>
                            <div class="font-monospace small text-truncate text-muted mt-2" id="testProxyResult" style="font-size: 0.75rem;"></div>
                        </div>
                    </div>
                </div>

                <!-- Diff Summary & Viewer (Compare Mode Only) -->
                <div id="diffModeContent" style="display:none;">
                    <div id="diffSummary" class="bg-white p-3 border rounded mb-3"></div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="fw-bold mb-0 small">Text Content Difference</h6>
                        <div class="d-flex gap-2 align-items-center">
                            <button class="btn btn-dark btn-xs py-1 px-2" style="font-size: 0.7rem;" onclick="copyFullReport()">Copy Report</button>
                            <div class="form-check form-switch small ms-2">
                                <input class="form-check-input" type="checkbox" id="diffOnlyToggle" onchange="renderDiff()">
                                <label class="form-check-label" for="diffOnlyToggle" style="font-size: 0.75rem;">Changes Only</label>
                            </div>
                        </div>
                    </div>
                    <div id="diffViewer" class="diff-viewer border rounded bg-white" style="max-height: 400px; overflow-y: auto;"></div>
                </div>

                <!-- PAC Preview (Test Mode Only) -->
                <div id="testModeContent" style="display:none;" class="mt-4 pt-3 border-top">
                    <div class="mb-2 d-flex justify-content-between align-items-center">
                        <label class="small text-muted mb-0">PAC File Content</label>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control form-control-sm" id="pacSearchInput" placeholder="Real-time Search..." oninput="searchInPac()" style="width: 200px;">
                        </div>
                    </div>
                    <div id="pacViewer" class="pac-viewer bg-white" style="max-height: 500px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
