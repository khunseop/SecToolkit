<!-- DNS Lookup Section -->
<div id="view-sysinfo" class="content-section">
    <div class="tool-card p-4 border shadow-sm mb-4">
        <h5 class="fw-bold mb-3">DNS Lookup</h5>
        <div class="row g-2 mb-3">
            <div class="col-sm-9">
                <input type="text" class="form-control" id="dnsHostInput" placeholder="e.g. www.google.com or 8.8.8.8" onkeypress="if(event.keyCode==13) doDnsLookup()">
            </div>
            <div class="col-sm-3">
                <button class="btn btn-primary w-100" onclick="doDnsLookup()">Lookup</button>
            </div>
        </div>
        <div id="dnsResult" class="small p-3 border rounded bg-light d-none">
            <div class="mb-2"><strong>Hostname:</strong> <span id="dnsResultHost" class="font-monospace"></span></div>
            <div class="mb-2"><strong>Resolved IPs:</strong> <span id="dnsResultIps" class="font-monospace text-primary fw-bold"></span></div>
            <div><strong>Reverse Name:</strong> <span id="dnsResultReverse" class="font-monospace"></span></div>
        </div>
    </div>

    <div class="tool-card p-4 border shadow-sm mb-3">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="fw-bold mb-0">Network & Proxy Status</h5>
            <button class="btn btn-sm btn-primary" onclick="refreshSystemInfo()">Refresh All</button>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="p-3 border rounded bg-light">
                    <small class="text-muted d-block mb-1">Public IP (External)</small>
                    <div id="sysPublicIp" class="h5 mb-0 fw-bold text-primary font-monospace">Loading...</div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="p-3 border rounded bg-light">
                    <small class="text-muted d-block mb-1">OS / Platform</small>
                    <div id="sysOsInfo" class="h5 mb-0 fw-bold font-monospace">-</div>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
                <span class="badge bg-dark">System Proxy Settings</span>
            </h6>
            <div id="sysProxyFormatted" class="row g-2">
                <div class="col-12 text-muted small">Fetching settings...</div>
            </div>
            <details class="mt-3">
                <summary class="small text-muted cursor-pointer">View Raw Output</summary>
                <pre id="sysProxyRaw" class="bg-dark text-success p-3 rounded small font-monospace mt-2" style="max-height: 300px; overflow-y: auto;"></pre>
            </details>
        </div>
    </div>
</div>
