<!-- DNS View Section -->
<div id="view-dns" class="content-section">
    <!-- DNS Lookup Tool -->
    <div class="tool-card p-4 border shadow-sm mb-4">
        <h5 class="fw-bold mb-3">DNS Lookup</h5>
        <div class="row g-2 mb-3">
            <div class="col-sm-9">
                <input type="text" class="form-control" id="dnsHostInput" placeholder="e.g. www.google.com or 8.8.8.8" onkeypress="if(event.keyCode==13) doDnsLookup()">
            </div>
            <div class="col-sm-3">
                <button class="btn btn-primary w-100" onclick="doDnsLookup()">Lookup</button>
            </div>
        </div>
        <div id="dnsResult" class="small p-3 border rounded bg-light d-none">
            <div class="mb-2"><strong>Hostname:</strong> <span id="dnsResultHost" class="font-monospace"></span></div>
            <div class="mb-2"><strong>Resolved IPs:</strong> <span id="dnsResultIps" class="font-monospace text-primary fw-bold"></span></div>
            <div><strong>Reverse Name:</strong> <span id="dnsResultReverse" class="font-monospace"></span></div>
        </div>
    </div>

    <!-- System DNS Settings -->
    <div class="tool-card p-4 border shadow-sm mb-3">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="fw-bold mb-0">System DNS Settings</h5>
            <button class="btn btn-sm btn-outline-primary" onclick="refreshDnsInfo()">Refresh DNS</button>
        </div>

        <div id="sysDnsFormatted" class="row g-2 mb-4">
            <div class="col-12 text-muted small">Fetching DNS settings...</div>
        </div>
        
        <details>
            <summary class="small text-muted cursor-pointer">View Raw DNS Output</summary>
            <pre id="sysDnsRaw" class="bg-dark text-success p-3 rounded small font-monospace mt-2" style="max-height: 300px; overflow-y: auto;"></pre>
        </details>
    </div>
</div>
